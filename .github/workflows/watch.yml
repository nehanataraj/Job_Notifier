name: Internship watcher poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: internship-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Poll job boards
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_USER_AGENT: ${{ secrets.USAJOBS_USER_AGENT }}
        run: python main.py --once

      # state.db is gitignored for local dev to avoid noisy commits from manual
      # runs; the workflow force-adds it so "already seen" job ids persist
      # between these ephemeral runners.
      - name: Persist seen-job state
        run: |
          git config user.name "internship-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f state.db
          git diff --cached --quiet || git commit -m "chore: update state.db [skip ci]"
          git push
